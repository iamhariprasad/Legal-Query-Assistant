name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: legal
          POSTGRES_PASSWORD: legal
          POSTGRES_DB: legal_assistant
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U legal -d legal_assistant"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Lint backend
        working-directory: backend
        run: ruff check app tests
      - name: Test backend
        working-directory: backend
        env:
          SECRET_KEY: ci-secret-key-ci-secret-key
          DATABASE_URL: postgresql+asyncpg://legal:legal@localhost:5432/legal_assistant
          REDIS_URL: redis://localhost:6379/0
          INDIAN_KANOON_API_TOKEN: ci-token
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Install frontend
        working-directory: frontend
        run: npm install
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint
      - name: Test frontend
        working-directory: frontend
        run: npm test -- --run
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: docker compose build

